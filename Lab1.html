<!DOCTYPE html>

  <title>Hello and Sum Script</title>

<body>

<script>
console.log("Hello, World!");
let num1 = parseFloat(prompt("Enter the first number:"));
let num2 = parseFloat(prompt("Enter the second number:"));

console.log("Sum:", sum);
</script>
